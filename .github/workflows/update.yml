name: Monitor Juridico Automatico
on:
  schedule:
    - cron: '0 9 * * *' # Roda todo dia às 09h da manhã
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: pip install google-generativeai feedparser beautifulsoup4
      - name: Run Update
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
      - name: Commit and Push
        run: |
          git config --global user.name 'Bot-Gabinete-Tauá'
          git config --global user.email 'bot@github.com'
          git add index.html
          git commit -m "IA: Atualização de leis e jurisprudência" || exit 0
          git push
